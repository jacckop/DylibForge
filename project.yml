name: DylibForge
options:
  bundleIdPrefix: com.yagami
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    DEVELOPMENT_TEAM: ""
targets:
  DylibForge:
    type: application
    platform: iOS
    sources:
      - path: DylibForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yagami.dylibforge
        PRODUCT_NAME: DylibForge
        INFOPLIST_FILE: DylibForge/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
