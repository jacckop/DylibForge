name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app for iOS
        run: |
          set -e
          xcodebuild \
            -project DylibForge.xcodeproj \
            -scheme DylibForge \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Release-iphoneos/DylibForge.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "DylibForge.app not found"
            exit 1
          fi

          rm -rf Payload DylibForge-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry DylibForge-unsigned.ipa Payload

          if [ ! -f "DylibForge-unsigned.ipa" ]; then
            echo "IPA was not created"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DylibForge-unsigned-ipa
          path: DylibForge-unsigned.ipa

      - name: Publish IPA to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          TAG="build-${{ github.run_number }}"
          TITLE="DylibForge Build ${{ github.run_number }}"

          gh release create "$TAG" DylibForge-unsigned.ipa \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --notes "Unsigned IPA built automatically by GitHub Actions.

          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}"
